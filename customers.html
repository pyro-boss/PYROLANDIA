<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks Availability</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

:root{
  --bg:#faf8f4;--surface:#fff;--border:#e8e4dc;
  --text:#1a1714;--muted:#8a8680;
  --accent:#ff4d00;--accent2:#ffaa00;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;
  --green-bg:#f0fdf4;--amber-bg:#fffbeb;--red-bg:#fef2f2;
  --green-border:#bbf7d0;--amber-border:#fde68a;--red-border:#fecaca;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HERO */
.hero{
  background: linear-gradient(135deg, #0e0e0f 0%, #1a0a00 50%, #0e0e0f 100%);
  padding:3rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(255,77,0,0.3) 0%, transparent 60%);
}
.hero-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;color:#fff;letter-spacing:4px;position:relative;line-height:1}
.hero-logo span{color:var(--accent)}
.hero-tagline{font-size:14px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-top:8px;position:relative}
.hero-note{
  display:inline-block;margin-top:1.5rem;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);border-radius:20px;
  padding:6px 18px;font-size:12px;color:rgba(255,255,255,0.6);position:relative;
}

/* LEGEND */
.legend{display:flex;justify-content:center;gap:20px;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green)}.dot.a{background:var(--amber)}.dot.r{background:var(--red)}

/* FILTERS */
.filters{max-width:900px;margin:1.5rem auto 0;padding:0 1.25rem;display:flex;gap:10px;flex-wrap:wrap}
.filters input{
  flex:1;min-width:180px;height:40px;padding:0 14px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;
}
.filters input:focus{outline:none;border-color:var(--accent)}
.filter-btn{
  height:40px;padding:0 16px;border:1.5px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;
}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* TAB FILTER */
.tab-filters{max-width:900px;margin:.75rem auto 0;padding:0 1.25rem;display:flex;gap:6px;flex-wrap:wrap}
.tab-f{
  padding:4px 14px;font-size:12px;border:1.5px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.15s;
}
.tab-f.active{background:var(--text);color:#fff;border-color:var(--text)}

/* GRID */
.grid{max-width:900px;margin:1.5rem auto 3rem;padding:0 1.25rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}

.card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:1rem 1.1rem;transition:all 0.2s;position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.card.OUT{opacity:0.55}
.card-tab{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.card-name{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:10px;color:var(--text)}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-price{font-weight:600;font-size:15px;color:var(--accent)}
.card-price.none{color:var(--muted);font-size:12px;font-weight:400}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.status-badge.IN{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.status-badge.LOW{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.status-badge.OUT{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.empty{text-align:center;padding:4rem;color:var(--muted);font-size:14px;grid-column:1/-1}

/* FOOTER */
.footer{text-align:center;padding:2rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}

@media(max-width:500px){
  .hero-logo{font-size:40px}
  .grid{grid-template-columns:1fr 1fr}
}
</style>

  <div class="legend-item"><div class="dot r"></div>Out of Stock</div>

<div class="filters">

var statusFilter='', tabFilter=-1;

function setStatus(s,btn){
  statusFilter=s;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');render();
}

function buildTabFilters(){
  var h='<button class="tab-f active" onclick="setTab(-1,this)">All Types</button>';
  for(var i=0;i<TABS.length;i++) h+='<button class="tab-f" onclick="setTab('+i+',this)">'+TABS[i].short+'</button>';
  document.getElementById('tabFilters').innerHTML=h;
}

function setTab(t,btn){
  tabFilter=t;
  document.querySelectorAll('.tab-f').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');render();
}

function render(){
  var search=(document.getElementById('search').value||'').toLowerCase();
  var rows=DATA.filter(function(d){
    if(tabFilter>=0&&d.t!==tabFilter)return false;
    if(statusFilter&&d.s!==statusFilter)return false;
    if(search&&d.n.toLowerCase().indexOf(search)===-1)return false;
    return true;
  });
  var grid=document.getElementById('grid');
  if(!rows.length){grid.innerHTML='<div class="empty">No products match your search.</div>';return;}
  var h='';
  for(var i=0;i<rows.length;i++){
    var d=rows[i];
    var label=d.s==='IN'?'In Stock':d.s==='LOW'?'Low Stock':'Out of Stock';

      '<div class="card-footer">'+

        '<div class="status-badge '+d.s+'"><div class="status-dot"></div>'+label+'</div>'+
      '</div>'+
    '</div>';
  }
  grid.innerHTML=h;
}

buildTabFilters();render();
