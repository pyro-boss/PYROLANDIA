<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyrolandia — Fireworks Availability</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#faf8f4;--surface:#fff;--border:#e8e4dc;--text:#1a1714;--muted:#8a8680;
  --accent:#ff4d00;--green:#16a34a;--amber:#d97706;--red:#dc2626;
  --green-bg:#f0fdf4;--amber-bg:#fffbeb;--red-bg:#fef2f2;
  --green-border:#bbf7d0;--amber-border:#fde68a;--red-border:#fecaca;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.hero{background:linear-gradient(135deg,#0e0e0f 0%,#1a0a00 50%,#0e0e0f 100%);padding:3rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,77,0,0.3) 0%,transparent 60%)}
.hero-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;color:#fff;letter-spacing:4px;position:relative;line-height:1}
.hero-logo span{color:#ff4d00}
.hero-tagline{font-size:14px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-top:8px;position:relative}
.hero-note{display:inline-block;margin-top:1.5rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 18px;font-size:12px;color:rgba(255,255,255,0.6);position:relative}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:6px;animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.legend{display:flex;justify-content:center;gap:20px;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green)}.dot.a{background:var(--amber)}.dot.r{background:var(--red)}
.controls{max-width:960px;margin:1.5rem auto 0;padding:0 1.25rem}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.75rem}
.filters input{flex:1;min-width:180px;height:40px;padding:0 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif}
.filters input:focus{outline:none;border-color:var(--accent)}
.filter-btn{height:40px;padding:0 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.sort-select{height:40px;padding:0 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.tab-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.tab-f{padding:4px 14px;font-size:12px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.tab-f.active{background:var(--text);color:#fff;border-color:var(--text)}
.last-updated{font-size:11px;color:var(--muted);margin-bottom:.5rem}
.grid{max-width:960px;margin:1rem auto 3rem;padding:0 1.25rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;transition:all 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.card.OUT{opacity:0.5}
.card-tab{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.card-name{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:10px;color:var(--text)}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.card-prices{display:flex;flex-direction:column;gap:2px}
.card-price{font-weight:600;font-size:15px;color:var(--accent)}
.card-price.none{color:var(--muted);font-size:12px;font-weight:400}
.card-case{font-size:11px;color:var(--muted)}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.status-badge.IN{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.status-badge.LOW{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.status-badge.OUT{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.loading-state{text-align:center;padding:4rem;color:var(--muted);font-size:14px;grid-column:1/-1}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:4rem;color:var(--muted);font-size:14px;grid-column:1/-1}
.footer{text-align:center;padding:2rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:500px){.hero-logo{font-size:38px}.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-logo">🎆 <span>PYROLANDIA</span></div>
  <div class="hero-tagline">Fireworks Availability</div>
  <div class="hero-note"><span class="live-dot"></span>Live inventory — updates automatically</div>
</div>
<div class="legend">
  <div class="legend-item"><div class="dot g"></div>In Stock</div>
  <div class="legend-item"><div class="dot a"></div>Low Stock — Get it while it lasts</div>
  <div class="legend-item"><div class="dot r"></div>Out of Stock</div>
</div>
<div class="controls">
  <div class="filters">
    <input type="text" id="search" placeholder="Search fireworks..." oninput="render()">
    <button class="filter-btn active" onclick="setStatus('',this)">All</button>
    <button class="filter-btn" onclick="setStatus('IN',this)">In Stock</button>
    <button class="filter-btn" onclick="setStatus('LOW',this)">Low Stock</button>
    <button class="filter-btn" onclick="setStatus('OUT',this)">Out of Stock</button>
    <select class="sort-select" id="sortOrder" onchange="render()">
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="status">By Status</option>
    </select>
  </div>
  <div class="tab-filters" id="tabFilters"></div>
  <div class="last-updated" id="lastUpdated"></div>
</div>
<div class="grid" id="grid">
  <div class="loading-state"><div class="spinner"></div><div>Loading live inventory...</div></div>
</div>
<div class="footer">Questions? Ask us about anything not listed — Pyrolandia 🎆</div>

<script>
var SHEET_ID = '16J7v_ODo4Ru4ZSytQI80dlA5a_Mh8fkgU5nqxEXd8U0';

// Exact tab names in order as they appear in your sheet
var TAB_NAMES = ['1/1','2/1','500G','200G','SHELLS','CANDLES','ROCKETS','FOUNTAINS','MISC'];
var TAB_LABELS = ['1/1 Cakes','2/1 Cakes','500 Gram','200 Gram','Shells','Candles','Rockets','Fountains','Misc'];

var DATA = [];
var statusFilter = '';
var tabFilter = -1;

function parseCSVRow(row) {
  var result=[], inQuotes=false, current='';
  for (var i=0;i<row.length;i++) {
    var ch=row[i];
    if(ch==='"'){inQuotes=!inQuotes;}
    else if(ch===','&&!inQuotes){result.push(current.trim().replace(/^"|"$/g,''));current='';}
    else{current+=ch;}
  }
  result.push(current.trim().replace(/^"|"$/g,''));
  return result;
}

function isHeaderRow(row) {
  // A header row has PRODUCT NAME or STATUS in it
  for (var i=0;i<row.length;i++) {
    var v = row[i].toUpperCase().trim();
    if (v==='PRODUCT NAME' || v==='STATUS') return true;
  }
  return false;
}

function isEmptyRow(row) {
  for (var i=0;i<row.length;i++) {
    if (row[i].trim()) return false;
  }
  return true;
}

function loadData() {
  document.getElementById('grid').innerHTML='<div class="loading-state"><div class="spinner"></div><div>Loading live inventory...</div></div>';

  // Fetch each tab individually using the sheet name parameter
  var promises = [];
  for (var i=0;i<TAB_NAMES.length;i++) {
    promises.push(fetchSingleTab(i));
  }

  Promise.all(promises).then(function(results) {
    DATA = [];
    for (var i=0;i<results.length;i++) {
      for (var j=0;j<results[i].length;j++) {
        DATA.push(results[i][j]);
      }
    }
    if (!DATA.length) {
      document.getElementById('grid').innerHTML='<div class="empty">Could not load inventory. Please try again shortly.</div>';
      return;
    }
    var now = new Date();
    document.getElementById('lastUpdated').textContent = 'Last updated: '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    buildTabFilters();
    render();
  });
}

function fetchSingleTab(tabIndex) {
  // Use gviz CSV export which works per-tab
  var url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+
            '/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(TAB_NAMES[tabIndex])+'&t='+Date.now();
  return fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(csv){ return parseTab(csv, tabIndex); })
    .catch(function(){ return []; });
}

function parseTab(csv, tabIndex) {
  var lines = csv.split('\n');
  if (!lines.length) return [];

  // Row 1=headers (index 0), Row 2=blank/formula (index 1 skipped), Row 3+=products (index 2+)
  var headers = parseCSVRow(lines[0]);
  var headerIdx = 0;
  if (!isHeaderRow(headers)) return [];

  // Map columns
  var statusCol=-1, nameCol=-1, priceCol=-1, casePriceCol=-1;
  var casesCol=-1, singlesCol=-1, totalCol=-1;
  for (var h=0;h<headers.length;h++) {
    var hdr = headers[h].toUpperCase().trim();
    if (hdr==='STATUS')                              statusCol   = h;
    else if(hdr==='PRODUCT NAME')                    nameCol     = h;
    else if(hdr==='PRICE'||hdr==='RETAIL')           priceCol    = h;
    else if(hdr==='CASE PRICE'||hdr==='CASEPRICE')   casePriceCol= h;
    else if(hdr==='CASES'||hdr==='CONTAINER')        casesCol    = h;
    else if(hdr==='SINGLES'||hdr==='STORE')          singlesCol  = h;
    else if(hdr==='TOTAL'||hdr==='QTY')              totalCol    = h;
  }
  if (nameCol===-1) return [];

  var items=[];
  for (var i=2;i<lines.length;i++) { // skip index 0 (headers) and index 1 (blank/formula)
    if (!lines[i].trim()) continue;
    var row = parseCSVRow(lines[i]);
    var name = nameCol>=0 ? row[nameCol].trim() : '';
    if (!name || name.toUpperCase()==='PRODUCT NAME') continue;

    var price     = priceCol>=0     ? row[priceCol].replace(/[^0-9.]/g,'').trim()     : '';
    var casePrice = casePriceCol>=0 ? row[casePriceCol].replace(/[^0-9.]/g,'').trim() : '';

    // Get qty — try TOTAL first, then CASES+SINGLES
    var qty = 0;
    if (totalCol>=0 && parseInt(row[totalCol])>0) {
      qty = parseInt(row[totalCol])||0;
    } else {
      var cases   = casesCol>=0   ? parseInt(row[casesCol])||0   : 0;
      var singles = singlesCol>=0 ? parseInt(row[singlesCol])||0 : 0;
      qty = cases + singles;
    }

        // Determine status — qty first, then fall back to sheet STATUS
        var rawStatus = statusCol>=0 ? row[statusCol].replace(/"/g,'').trim().toUpperCase() : '';
        var status;
        if (qty>0) {
          status = qty<=2 ? 'LOW' : 'IN';
        } else if (rawStatus==='IN'||rawStatus==='LOW'||rawStatus==='OUT') {
          status = rawStatus;
        } else {
          continue;
        }

    if (status==='STATUS') continue;
    items.push({t:tabIndex, s:status, n:name, p:price, cp:casePrice});
  }
  return items;
}

function setStatus(s,btn){
  statusFilter=s;
  var btns=document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function buildTabFilters(){
  var h='<button class="tab-f active" onclick="setTab(-1,this)">All Types</button>';
  for(var i=0;i<TAB_NAMES.length;i++){
    var has=false;
    for(var j=0;j<DATA.length;j++){if(DATA[j].t===i){has=true;break;}}
    if(has) h+='<button class="tab-f" onclick="setTab('+i+',this)">'+TAB_LABELS[i]+'</button>';
  }
  document.getElementById('tabFilters').innerHTML=h;
}

function setTab(t,btn){
  tabFilter=t;
  var btns=document.querySelectorAll('.tab-f');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function render(){
  var search=(document.getElementById('search').value||'').toLowerCase();
  var sort=document.getElementById('sortOrder').value;
  var rows=[];
  for(var i=0;i<DATA.length;i++){
    var d=DATA[i];
    if(tabFilter>=0&&d.t!==tabFilter) continue;
    if(statusFilter&&d.s!==statusFilter) continue;
    if(search&&d.n.toLowerCase().indexOf(search)===-1) continue;
    rows.push(d);
  }
  if(sort==='az') rows.sort(function(a,b){return a.n.localeCompare(b.n);});
  else if(sort==='za') rows.sort(function(a,b){return b.n.localeCompare(a.n);});
  else if(sort==='status'){var ord={OUT:0,LOW:1,IN:2};rows.sort(function(a,b){return ord[a.s]-ord[b.s];});}
  var grid=document.getElementById('grid');
  if(!rows.length){grid.innerHTML='<div class="empty">No products match your search.</div>';return;}
  var h='';
  for(var r=0;r<rows.length;r++){
    var d=rows[r];
    var label=d.s==='IN'?'In Stock':d.s==='LOW'?'Low Stock':'Out of Stock';
    h+='<div class="card '+d.s+'">'+
      '<div class="card-tab">'+TAB_LABELS[d.t]+'</div>'+
      '<div class="card-name">'+d.n+'</div>'+
      '<div class="card-footer">'+
        '<div class="card-prices">'+
          '<div class="card-price '+(d.p?'':'none')+'">'+(d.p?'$'+d.p:'Price on request')+'</div>'+
          (d.cp?'<div class="card-case">Case: $'+d.cp+'</div>':'')+
        '</div>'+
        '<div class="status-badge '+d.s+'"><div class="status-dot"></div>'+label+'</div>'+
      '</div>'+
    '</div>';
  }
  grid.innerHTML=h;
}

loadData();
setInterval(loadData, 3*60*1000);
</script>
</body>
</html>
